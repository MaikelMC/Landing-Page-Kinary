<!doctype html>
<html lang="es-ES">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Noticias — Kynari | Ciberseguridad & Desarrollo Seguro</title>
<meta name="description" content="Análisis, alertas y perspectivas del mundo de la ciberseguridad y el desarrollo seguro por Kynari.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050505;
    --surface: #0a0a0a;
    --surface-elevated: #111111;
    --fg: #f0ece4;
    --fg-2: #c8c0b0;
    --muted: #8a8070;
    --accent: #d4af37;
    --accent-on: #000000;
    --accent-glow: rgba(212,175,55,0.15);
    --accent-glow-strong: rgba(212,175,55,0.25);
    --border-subtle: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --glass-bg: rgba(255,255,255,0.03);
    --glass-border: rgba(255,255,255,0.08);
    --glass-highlight: rgba(255,255,255,0.05);
    --font-display: "Inter Tight", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --font-body: "Inter", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, Monaco, Consolas, monospace;
    --text-xs: 11px;
    --text-sm: 13px;
    --text-base: 16px;
    --text-lg: 20px;
    --text-xl: 28px;
    --text-2xl: 42px;
    --text-3xl: 64px;
    --leading-body: 1.5;
    --leading-tight: 1.05;
    --tracking-display: -0.02em;
    --tracking-wide: 0.08em;
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;
    --space-10: 40px;
    --space-12: 48px;
    --space-16: 64px;
    --space-20: 80px;
    --space-24: 96px;
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    --radius-pill: 980px;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --container-max: 960px;
    --container-gutter: 24px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; overflow-x: hidden; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg);
  line-height: var(--leading-body);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  min-height: 100dvh;
  width: 100%;
}

  /* ─── Mesh Gradient Background ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(212,175,55,0.04) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 80% 30%, rgba(100,180,255,0.02) 0%, transparent 40%),
      radial-gradient(ellipse 50% 60% at 50% 80%, rgba(212,175,55,0.03) 0%, transparent 50%);
  }

  /* ─── Noise Overlay ─── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  a { color: var(--accent); text-decoration: none; transition: color 0.4s var(--ease-out-expo); }
  a:hover { color: var(--fg); }
  p { text-wrap: pretty; }
  img { max-width: 100%; display: block; }

  .container {
    max-width: var(--container-max);
    margin: 0 auto;
    padding: 0 var(--container-gutter);
    position: relative;
    z-index: 2;
  }

  /* ─── Navigation (Floating Glass Pill) ─── */
  nav {
    position: fixed;
    top: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    z-index: 100;
    pointer-events: none;
  }
  nav .container {
    padding: 0;
    display: flex;
    justify-content: center;
  }
  .nav-pill {
    display: flex;
    align-items: center;
    gap: var(--space-5);
    padding: 12px 24px;
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-pill);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 8px 32px rgba(0,0,0,0.4);
    pointer-events: all;
  }
  .nav-brand {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--fg);
    white-space: nowrap;
    transition: opacity 0.3s var(--ease-out-expo);
  }
  .nav-brand span { color: var(--accent); }
  .nav-brand:hover { opacity: 0.7; }

  .nav-cta {
    font-family: var(--font-display);
    text-transform: uppercase;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: var(--tracking-wide);
    padding: 8px 20px;
    background: var(--accent);
    color: var(--accent-on);
    border-radius: var(--radius-pill);
    transition: all 0.4s var(--ease-out-expo);
  }
  .nav-cta:hover {
    background: var(--fg);
    color: var(--bg);
    transform: scale(1.02);
  }

  .nav-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
    margin-left: auto;
  }
  .nav-toggle span {
    display: block;
    width: 20px;
    height: 1.5px;
    background: var(--fg);
    transition: all 0.4s var(--ease-out-expo);
    transform-origin: center;
  }
  .nav-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
  .nav-toggle.active span:nth-child(2) { opacity: 0; transform: translateX(-6px); }
  .nav-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }

  .nav-links {
    display: none;
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(280px, 75vw);
    height: 100dvh;
    min-height: 100dvh;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(40px) saturate(1.6);
    -webkit-backdrop-filter: blur(40px) saturate(1.6);
    flex-direction: column;
    padding: 80px var(--space-5) var(--space-6);
    gap: var(--space-1);
    border-left: 1px solid var(--glass-border);
    transform: translateX(100%);
    opacity: 0;
    pointer-events: none;
    transition: all 0.45s var(--ease-out-expo);
    z-index: 101;
  }
  .nav-links.open { display: flex; transform: translateX(0); opacity: 1; pointer-events: all; }
  .nav-links a {
    display: block;
    width: 100%;
    text-align: left;
    font-size: 14px;
    letter-spacing: 0.08em;
    padding: var(--space-3) var(--space-4);
    color: var(--muted);
    border-radius: var(--radius-sm);
  }
  .nav-links a:hover {
    color: var(--fg);
    background: rgba(255,255,255,0.04);
  }
  .nav-links a.active {
    color: var(--accent);
    background: rgba(212,175,55,0.06);
  }
  .nav-links a.nav-cta {
    margin-top: var(--space-4);
    padding: var(--space-3) var(--space-5);
    background: var(--accent);
    color: var(--accent-on);
    font-weight: 600;
    border-radius: var(--radius-pill);
    text-align: center;
  }
  .nav-links a.nav-cta:hover {
    background: var(--fg);
    color: var(--bg);
  }

  /* ─── Desktop nav-links ─── */
  @media (min-width: 921px) {
    .nav-links {
      display: flex;
      position: static;
      flex-direction: row;
      align-items: center;
      gap: var(--space-5);
      height: auto;
      min-height: 0;
      padding: 0;
      width: auto;
      background: none;
      backdrop-filter: none;
      border: none;
      transform: none;
      opacity: 1;
      pointer-events: all;
      z-index: auto;
      transition: none;
    }
    .nav-links a {
      display: inline;
      width: auto;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
      padding: 0;
      border-radius: 0;
      text-align: left;
      position: relative;
      opacity: 1;
      transform: none;
      transition: color 0.4s var(--ease-out-expo);
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.4s var(--ease-out-expo);
    }
    .nav-links a:hover { color: var(--fg); }
    .nav-links a:hover::after { width: 100%; background: var(--accent); }
    .nav-links a.active { color: var(--accent); }
    .nav-links a.active::after { width: 100%; }
    .nav-links a.nav-cta {
      display: inline;
      margin-top: 0;
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: var(--tracking-wide);
      padding: 8px 20px;
      background: var(--accent);
      color: var(--accent-on);
      border-radius: var(--radius-pill);
      text-align: center;
      width: auto;
    }
    .nav-links a.nav-cta:hover {
      background: var(--fg);
      color: var(--bg);
    }
  }

  @media (max-width: 920px) {
    .nav-toggle { display: flex; }
    nav {
      top: 12px;
      left: 16px;
      right: 16px;
      width: auto;
      display: block;
    }
    nav .container {
      display: block;
    }
    .nav-pill {
      padding: 10px 16px;
      justify-content: space-between;
    }

    .nav-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(5,5,5,0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 98;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s var(--ease-out-expo);
    }
    .nav-backdrop.visible {
      opacity: 1;
      pointer-events: all;
    }

    .nav-links.open a {
      opacity: 1;
      transform: translateX(0);
    }
    .nav-links.open a:nth-child(1) { transition-delay: 0.06s; }
    .nav-links.open a:nth-child(2) { transition-delay: 0.1s; }
    .nav-links.open a:nth-child(3) { transition-delay: 0.14s; }
    .nav-links.open a:nth-child(4) { transition-delay: 0.18s; }
    .nav-links.open a:nth-child(5) { transition-delay: 0.22s; }
    .nav-links.open a:nth-child(6) { transition-delay: 0.26s; }
    .nav-links.open a.nav-cta { transition-delay: 0.3s; }
    .nav-links a {
      opacity: 0;
      transform: translateX(24px);
      transition: all 0.4s var(--ease-out-expo), background 0.3s;
    }
  }

  /* ─── Blog Header ─── */
  .blog-header {
    padding: 160px 0 80px;
    text-align: center;
    position: relative;
  }
  .blog-header::before {
    content: '';
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
    pointer-events: none;
    filter: blur(80px);
    opacity: 0.6;
  }
  .blog-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-bottom: var(--space-6);
    padding: 6px 16px;
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-pill);
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.8s var(--ease-out-expo) 0.1s forwards;
  }
  .blog-label::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  .blog-title {
    font-family: var(--font-display);
    font-size: clamp(40px, 8vw, var(--text-3xl));
    font-weight: 700;
    letter-spacing: var(--tracking-display);
    line-height: var(--leading-tight);
    color: var(--fg);
    margin-bottom: var(--space-6);
    opacity: 0;
    transform: translateY(24px);
    animation: fadeUp 0.8s var(--ease-out-expo) 0.2s forwards;
  }
  .blog-desc {
    font-size: var(--text-lg);
    color: var(--muted);
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.7;
    opacity: 0;
    transform: translateY(24px);
    animation: fadeUp 0.8s var(--ease-out-expo) 0.35s forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  /* ─── Article Cards (Double-Bezel Glass) ─── */
  .articles {
    padding-bottom: var(--space-24);
  }

  .article-card {
    position: relative;
    margin-bottom: var(--space-8);
    border-radius: var(--radius-lg);
    opacity: 0;
    transform: translateY(32px);
    transition: opacity 0.7s var(--ease-out-expo), transform 0.7s var(--ease-out-expo);
  }
  .article-card.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .article-card:nth-child(2) { transition-delay: 0.08s; }
  .article-card:nth-child(3) { transition-delay: 0.16s; }
  .article-card:nth-child(4) { transition-delay: 0.24s; }
  .article-card:nth-child(5) { transition-delay: 0.32s; }

  /* Outer Shell (Double-Bezel) */
  .article-shell {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    padding: 2px;
    transition: all 0.5s var(--ease-out-expo);
  }
  .article-card:hover .article-shell {
    border-color: var(--border-hover);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 20px 60px rgba(0,0,0,0.3),
      0 0 40px var(--accent-glow);
  }
  .article-card.open .article-shell {
    border-color: rgba(212,175,55,0.15);
    box-shadow:
      0 0 0 1px rgba(212,175,55,0.06) inset,
      0 24px 80px rgba(0,0,0,0.4),
      0 0 60px var(--accent-glow);
  }

  /* Inner Core */
  .article-inner {
    background: var(--surface);
    border-radius: calc(var(--radius-lg) - 2px);
    overflow: hidden;
    position: relative;
  }
  .article-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  .article-header {
    padding: var(--space-8) var(--space-8) var(--space-6);
    cursor: pointer;
    position: relative;
  }
  .article-meta {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    margin-bottom: var(--space-4);
    flex-wrap: wrap;
  }
  .article-tag {
    display: inline-flex;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    padding: 5px 12px;
    background: rgba(212,175,55,0.08);
    color: var(--accent);
    border-radius: var(--radius-pill);
    border: 1px solid rgba(212,175,55,0.12);
  }
  .article-date {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .article-title {
    font-family: var(--font-display);
    font-size: clamp(22px, 3vw, 28px);
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--fg);
    line-height: 1.2;
    margin-bottom: var(--space-3);
    transition: color 0.4s var(--ease-out-expo);
  }
  .article-card:hover .article-title { color: #fff; }
  .article-excerpt {
    font-size: var(--text-base);
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: var(--space-5);
    max-width: 600px;
  }
  .article-toggle {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-display);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: var(--tracking-wide);
    color: var(--accent);
    font-weight: 600;
    background: none;
    border: none;
    cursor: pointer;
    padding: 10px 20px;
    border-radius: var(--radius-pill);
    border: 1px solid rgba(212,175,55,0.2);
    transition: all 0.4s var(--ease-out-expo);
  }
  .article-toggle:hover {
    background: rgba(212,175,55,0.08);
    border-color: rgba(212,175,55,0.35);
    gap: 14px;
  }
  .article-toggle-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(212,175,55,0.1);
    font-size: 14px;
    transition: transform 0.5s var(--ease-spring);
  }
  .article-card.open .article-toggle-icon { transform: rotate(45deg); }

  /* Accordion Content */
  .article-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.7s var(--ease-out-expo);
  }
  .article-card.open .article-content {
    max-height: 2000px;
  }
  .article-content-inner {
    padding: 0 var(--space-8) var(--space-8);
    border-top: 1px solid var(--border-subtle);
    padding-top: var(--space-6);
  }
  .article-content-inner p {
    font-size: var(--text-base);
    color: var(--fg-2);
    line-height: 1.8;
    margin-bottom: var(--space-5);
  }
  .article-content-inner h4 {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--fg);
    margin-bottom: var(--space-3);
    margin-top: var(--space-8);
    padding-bottom: var(--space-2);
    border-bottom: 1px solid var(--border-subtle);
  }
  .article-content-inner h4:first-child { margin-top: 0; }
  .article-content-inner ul {
    list-style: none;
    padding: 0;
    margin-bottom: var(--space-5);
  }
  .article-content-inner li {
    font-size: var(--text-base);
    color: var(--fg-2);
    line-height: 1.7;
    padding-left: var(--space-6);
    position: relative;
    margin-bottom: var(--space-3);
  }
  .article-content-inner li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 10px;
    width: 5px;
    height: 5px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent-glow);
  }
  .article-content-inner strong { color: var(--fg); font-weight: 600; }
  .article-content-inner a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(212,175,55,0.3);
    transition: text-decoration-color 0.3s;
  }
  .article-content-inner a:hover {
    text-decoration-color: var(--accent);
  }

  /* ─── Footer ─── */
  footer {
    border-top: 1px solid var(--border-subtle);
    padding: var(--space-10) 0;
    text-align: center;
    position: relative;
    z-index: 2;
  }
  footer p {
    font-size: var(--text-sm);
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  footer span { color: var(--accent); }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    .blog-header { padding: 120px 0 48px; }
    .blog-title { font-size: clamp(32px, 10vw, 48px); }
    .blog-desc { font-size: var(--text-base); }
    .article-header { padding: var(--space-6) var(--space-5) var(--space-5); }
    .article-content-inner { padding: 0 var(--space-5) var(--space-6); padding-top: var(--space-5); }
    .article-title { font-size: 22px; }
    .article-card { margin-bottom: var(--space-6); }
  }
  @media (max-width: 430px) {

<script>
  /* ─── Mobile nav toggle ─── */
  const toggle = document.querySelector('.nav-toggle');
  const links = document.querySelector('.nav-links');
  const backdrop = document.querySelector('.nav-backdrop');

  function openNav() {
    links.classList.add('open');
    toggle.classList.add('active');
    toggle.setAttribute('aria-expanded', 'true');
    backdrop.classList.add('visible');
  }
  function closeNav() {
    links.classList.remove('open');
    toggle.classList.remove('active');
    toggle.setAttribute('aria-expanded', 'false');
    backdrop.classList.remove('visible');
  }

  toggle.addEventListener('click', () => {
    links.classList.contains('open') ? closeNav() : openNav();
  });
  backdrop.addEventListener('click', closeNav);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && links.classList.contains('open')) closeNav();
  });

  /* ─── Scroll Reveal ─── */
  const revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        revealObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });

  /* ─── Blog Articles ─── */
  (function() {
    const articulos = [
      {
        id: 1,
        tag: "Inteligencia Artificial",
        titulo: "IA gratuita 2026: Muse Image, DeepSeek V4, MiniMax M2.1 y créditos Grok API",
        fecha: "Jul 2026",
        excerpt: "Meta lanza Muse Image, DeepSeek V4 y MiniMax M2.1 compiten con modelos cerrados, y Grok API ofrece créditos gratuitos para desarrolladores. Panorama completo de la IA accesible en 2026.",
        contenido: `
          <p>El ecosistema de inteligencia artificial gratuita y open source vive un momento sin precedentes en 2026. Nuevas herramientas y modelos estan democratizando el acceso a la IA, permitiendo que negocios de cualquier tamaño aprovechen estas tecnologias sin grandes inversiones iniciales.</p>

          <h4>Otras herramientas open source recomendadas</h4>
          <p>Plataformas como SiliconFlow, Hugging Face, Falcon AI, Stable LM y OpenChat continuan siendo referentes en 2026, ofreciendo capacidades potentes sin costo. El ecosistema open source de IA se consolida como una alternativa viable y competitiva frente a las soluciones cerradas.</p>
        `
      },
      {
        id: 2,
        tag: "Ciberseguridad",
        titulo: "Aumento del 89% en ataques impulsados por IA: el panorama 2026",
        fecha: "2026",

        contenido: `
          <p>El panorama de la ciberseguridad en 2026 esta marcado por una escalada sin precedentes en ataques impulsados por inteligencia artificial. Segun los informes de CrowdStrike, ESET y otras firmas lideres, los ataques mediados por IA han aumentado un 89% respecto al ano anterior, con tiempos de propagacion que se reducen a apenas 29 minutos.</p>

          <p>Los atacantes han concentrado sus esfuerzos en la cadena de suministro (supply chain) y en infraestructura cloud, dos vectores que ofrecen el maximo impacto con el minimo esfuerzo. La capacidad de la IA para automatizar el reconocimiento de vulnerabilidades y la ejecucion de exploits ha acelerado dramaticamente estos ataques.</p>

          <h4>Tendencias que marcan 2026</h4>
          <p>Los informes senalan un enfasis creciente en deepfakes como herramienta de ingenieria social, ransomware potenciado por IA que se adapta a las defensas en tiempo real, y una gobernanza de IA que las empresas comienzan a implementar para protegerse. La recomendacion de los expertos es clara: diagnosticos de seguridad regulares y capacitacion continua del personal son la primera linea de defensa.</p>
          <ul>
            <li><strong>89% mas ataques</strong> impulsados por IA respecto al periodo anterior</li>
            <li><strong>Propagacion en 29 minutos</strong> desde la intrusion inicial</li>
            <li><strong>Supply chain y cloud</strong> como vectores principales</li>
            <li><strong>Deepfakes y ransomware</strong> como amenazas crecientes</li>
            <li><strong>Gobernanza de IA</strong> como prioridad empresarial</li>
          </ul>
          <p>Fuentes: CrowdStrike Global Threat Report 2026, informes Laguun y WEF Global Cybersecurity Outlook 2026.</p>
        `
      },
      {
        id: 3,
        tag: "Open Source",
        titulo: "Herramientas open source de ciberseguridad y productividad para 2026",
        fecha: "2026",
        excerpt: "Allama automatiza seguridad con IA, Pompelmi escanea uploads en Node.js, OpenSSF se actualiza. SiliconFlow, Hugging Face, Falcon AI, Stable LM y OpenChat completan el ecosistema.",
        contenido: `
          <p>El software open source continua siendo un pilar fundamental tanto para la ciberseguridad como para la productividad empresarial. En 2026, varias herramientas destacan por su capacidad para ofrecer soluciones profesionales sin coste de licencia.</p>

          <h4>Allama: automatizacion de seguridad con IA</h4>
          <p>Allama se posiciona como una herramienta clave para la automatizacion de tareas de seguridad mediante inteligencia artificial. Permite a equipos de seguridad delegar procesos repetitivos en agentes automatizados, liberando tiempo para el analisis profundo y la toma de decisiones estrategicas.</p>

          <h4>Pempelmi: escaneo de uploads en Node.js</h4>
          <p>Pempelmi es una herramienta open source especializada en el escaneo de archivos subidos (uploads) en aplicaciones Node.js. Su capacidad para detectar malware y contenido malicioso en tiempo real la convierte en un componente esencial para cualquier aplicacion que maneje subidas de usuarios.</p>

          <h4>OpenSSF y las actualizaciones de seguridad</h4>
          <p>La Open Source Security Foundation (OpenSSF) ha recibido actualizaciones significativas que refuerzan la seguridad del ecosistema open source en general, mejorando la respuesta a vulnerabilidades y la coordinacion entre proyectos.</p>

          <h4>Ecosistema open source recomendado</h4>
          <p>Plataformas como SiliconFlow, Hugging Face, Falcon AI, Stable LM y OpenChat continuan siendo recomendadas en 2026 como herramientas gratuitas y potentes para desarrollo, inteligencia artificial y automatizacion.</p>
        `
      },
      {
        id: 4,
        tag: "Automatización",
        titulo: "n8n 2026: nuevos nodos AI Agent, soporte multi-modelo y Canvas UI",
        fecha: "Jul 2026",
        excerpt: "n8n incorpora nodos AI Agent con soporte para Claude, Grok y Gemini, nuevo Canvas UI, mas nodos (Anthropic, Groq) y mejor manejo de errores y seguridad.",
        contenido: `
          <p>n8n, la plataforma de automatizacion de flujos de trabajo open source, ha recibido actualizaciones significativas en 2026 que la consolidan como una de las herramientas mas potentes para la automatizacion empresarial con inteligencia artificial integrada.</p>

          <h4>Nuevos nodos AI Agent mejorados</h4>
          <p>La actualizacion mas destacada son los nuevos nodos AI Agent, que ahora ofrecen soporte multi-modelo. Los agentes pueden trabajar con Claude (Anthropic), Grok (xAI) y Gemini (Google), permitiendo elegir el modelo mas adecuado para cada tarea especifica sin cambiar de plataforma.</p>

          <h4>Canvas UI y nuevos nodos</h4>
          <p>n8n ha renovado su interfaz con un nuevo Canvas UI que facilita la creacion visual de flujos de trabajo complejos. Ademas, se han anadido nuevos nodos especificos para Anthropic, Groq y otros proveedores, ampliando las capacidades de integracion de la plataforma.</p>

          <p>Las versiones recientes (2.29-2.30, julio 2026) incluyen mejoras sustanciales en el manejo de errores y en la seguridad de los flujos. Estas actualizaciones permiten construir automatizaciones mas robustas y confiables, reduciendo el tiempo de resolucion de incidencias.</p>
          <p>Para mas detalle: docs.n8n.io/changelog y GitHub releases.</p>
        `
      },
      {
        id: 5,
        tag: "Automatización",
        titulo: "Telegram AI Bots Revolution: 11 nuevas funciones para bots",
        fecha: "Jun 2026",
        excerpt: "Telegram lanza Guest Bots, comunicación bot-to-bot, automatizaciones de chat y rich text. Actualizaciones importantes de junio 2026.",
        contenido: `
          <p>Telegram ha anunciado una de las actualizaciones mas importantes para su plataforma de bots desde su creacion. Las 11 nuevas funciones, anunciadas en junio de 2026, transforman radicalmente las capacidades de los bots en la plataforma.</p>

          <h4>Guest Bots: mencionables en cualquier chat</h4>
          <p>Una de las novedades mas esperadas son los Guest Bots, que ahora pueden ser mencionados directamente en cualquier chat sin necesidad de anadirlos como miembros del grupo. Esto permite a los usuarios invocar funcionalidades de bots de forma mucho mas natural y flexible.</p>

          <h4>Comunicacion bot-to-bot</h4>
          <p>La nueva capacidad de comunicacion bot-to-bot permite que diferentes bots colaboren entre si, abriendo posibilidades de automatizacion avanzada. Un bot puede delegar tareas a otro bot especializado, creando ecosistemas de automatizacion complejos sin intervencion humana.</p>

          <h4>Automatizaciones de chat y rich text</h4>
          <p>Las automatizaciones de chat permiten programar respuestas automaticas, moderacion inteligente y flujos conversacionales avanzados. El soporte para rich text mejora la presentacion de contenido, permitiendo mensajes con formato enriquecido, botones interactivos y mucho mas.</p>
          <p>Fuente: telegram.org/blog/ai-bot-revolution-11-new-features.</p>
        `
      }
    ];

    const list = document.getElementById('articles-list');
    if (!list) return;

    articulos.forEach((a) => {
      const card = document.createElement('article');
      card.className = 'article-card';
      card.id = 'noticia-' + a.id;

      card.innerHTML = `
        <div class="article-shell">
          <div class="article-inner">
            <div class="article-header">
              <div class="article-meta">
                <span class="article-tag">${a.tag}</span>
                <span class="article-date">${a.fecha}</span>
              </div>
              <h2 class="article-title">${a.titulo}</h2>
              <p class="article-excerpt">${a.excerpt}</p>
              <button class="article-toggle" aria-expanded="false" aria-controls="content-${a.id}">
                Leer mas <span class="article-toggle-icon">+</span>
              </button>
            </div>
            <div class="article-content" id="content-${a.id}" role="region" aria-hidden="true">
              <div class="article-content-inner">
                ${a.contenido}
              </div>
            </div>
          </div>
        </div>
      `;
      list.appendChild(card);
      revealObserver.observe(card);
    });

    /* Accordion */
    list.addEventListener('click', (e) => {
      const toggle = e.target.closest('.article-toggle');
      const header = e.target.closest('.article-header');
      if (!toggle && !header) return;

      const card = (toggle || header).closest('.article-card');
      const content = card.querySelector('.article-content');
      const btn = card.querySelector('.article-toggle');
      const isOpen = card.classList.contains('open');

      list.querySelectorAll('.article-card.open').forEach(openCard => {
        openCard.classList.remove('open');
        openCard.querySelector('.article-content').setAttribute('aria-hidden', 'true');
        openCard.querySelector('.article-toggle').setAttribute('aria-expanded', 'false');
      });

      if (!isOpen) {
        card.classList.add('open');
        content.setAttribute('aria-hidden', 'false');
        btn.setAttribute('aria-expanded', 'true');
      }
    });

    /* Auto-expand from hash */
    if (location.hash) {
      const target = document.querySelector(location.hash);
      if (target && target.classList.contains('article-card')) {
        setTimeout(() => {
          const navH = document.querySelector('nav')?.offsetHeight || 80;
          window.scrollTo({ top: target.getBoundingClientRect().top + window.scrollY - navH - 40, behavior: 'smooth' });
          const btn = target.querySelector('.article-toggle');
          const content = target.querySelector('.article-content');
          target.classList.add('open');
          content.setAttribute('aria-hidden', 'false');
          btn.setAttribute('aria-expanded', 'true');
        }, 400);
      }
    }
  })();
</script>
